<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Control - Manage Sites</title>
    <link rel="stylesheet" href="options.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <header>
            <div class="logo-container">
                <div class="logo-pulse"></div>
                <h1>JS Control <span class="subtitle">Settings</span></h1>
            </div>
        </header>

        <main>
            <div class="card">
                <h2>Permanently Blocked Sites</h2>
                <p class="desc">JavaScript is completely disabled on the domains listed below.</p>

                <div class="list-container">
                    <ul id="siteList">
                        <!-- Sites will be populated here by JS -->
                    </ul>
                    <div id="emptyState" class="empty-state" style="display: none;">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle>
                            <path d="M16 16s-1.5-2-4-2-4 2-4 2"></path>
                            <line x1="9" y1="9" x2="9.01" y2="9"></line>
                            <line x1="15" y1="9" x2="15.01" y2="9"></line>
                        </svg>
                        <p>No sites are permanently blocked yet.</p>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="options.js"></script>
</body>

</html>
